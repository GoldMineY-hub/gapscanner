<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gap Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0d0f; --surface:#111417; --surface2:#181c20;
    --border:#1f2428; --border2:#2a3038; --text:#e2e8f0; --muted:#64748b;
    --accent:#00d4aa; --accent2:#0099ff; --green:#00d4aa; --red:#ff4d6a;
    --yellow:#ffc947; --purple:#a78bfa;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(rgba(0,212,170,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,.03) 1px,transparent 1px);
    background-size:40px 40px}
  .app{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:20px}

  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
  .logo{display:flex;align-items:baseline;gap:12px}
  .logo h1{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--accent)}
  .logo span{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .header-right{display:flex;align-items:center;gap:12px}
  .clock{font-family:var(--mono);font-size:13px;color:var(--muted)}
  .mstatus{font-family:var(--mono);font-size:10px;padding:4px 9px;border-radius:3px;letter-spacing:1px;text-transform:uppercase}
  .mstatus.pre{background:rgba(255,201,71,.12);color:var(--yellow);border:1px solid rgba(255,201,71,.25)}
  .mstatus.open{background:rgba(0,212,170,.12);color:var(--green);border:1px solid rgba(0,212,170,.25)}
  .mstatus.closed{background:rgba(100,116,139,.12);color:var(--muted);border:1px solid rgba(100,116,139,.2)}

  .worker-bar{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .worker-bar label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
  .worker-bar input{flex:1;min-width:260px;background:var(--bg);border:1px solid var(--border2);border-radius:4px;padding:7px 11px;font-family:var(--mono);font-size:12px;color:var(--accent);outline:none}
  .worker-bar input:focus{border-color:var(--accent)}
  .worker-bar input::placeholder{color:var(--muted)}
  .wstatus{font-family:var(--mono);font-size:11px;white-space:nowrap}
  .wstatus.ok{color:var(--green)} .wstatus.err{color:var(--red)} .wstatus.idle{color:var(--muted)}

  .layout{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start}
  @media(max-width:1100px){.layout{grid-template-columns:1fr}}

  .controls{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;margin-bottom:14px}
  .cg{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:11px 13px}
  .cg label{display:block;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
  .cg input,.cg select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:4px;padding:6px 9px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none}
  .cg input:focus,.cg select:focus{border-color:var(--accent)}
  .cg select option{background:var(--surface2)}

  .actions{display:flex;gap:9px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
  .btn{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;border-radius:4px;border:none;cursor:pointer;transition:all .15s}
  .btn-primary{background:var(--accent);color:#000}
  .btn-primary:hover{background:#00f0c2;transform:translateY(-1px)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn-sec{background:transparent;color:var(--muted);border:1px solid var(--border2)}
  .btn-sec:hover{border-color:var(--accent);color:var(--accent)}
  .scan-info{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:auto}

  .stats-row{display:flex;gap:22px;margin-bottom:14px;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column;gap:3px}
  .stat-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
  .stat-value{font-family:var(--mono);font-size:18px;font-weight:600}
  .stat-value.g{color:var(--green)} .stat-value.m{font-size:13px;color:var(--muted)}

  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden}
  .table-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border)}
  .table-head h2{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
  .rcount{font-family:var(--mono);font-size:10px;color:var(--muted)}
  .tbl-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:700px}
  thead th{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
  thead th:hover{color:var(--accent)} thead th.sorted{color:var(--accent)}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
  tbody tr:hover{background:var(--surface2)} tbody tr:last-child{border-bottom:none}
  tbody tr.new-entry{animation:flash 1.2s ease-out}
  @keyframes flash{0%{background:rgba(0,212,170,.12)}100%{background:transparent}}
  td{padding:10px 12px;font-family:var(--mono);font-size:12px;white-space:nowrap}
  .td-ticker{font-weight:600;font-size:13px;color:var(--accent2)}
  .td-gap{font-weight:600;color:var(--green)}
  .td-muted{color:var(--muted);font-size:11px}
  .atag{display:inline-block;font-size:8px;padding:2px 5px;border-radius:2px;letter-spacing:1px;text-transform:uppercase;margin-left:5px;font-weight:600}
  .atag.hot{background:rgba(255,77,106,.15);color:var(--red);border:1px solid rgba(255,77,106,.3)}
  .atag.new{background:rgba(0,212,170,.15);color:var(--green);border:1px solid rgba(0,212,170,.3)}
  .score-bar{display:flex;align-items:center;gap:7px}
  .score-track{width:48px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
  .score-fill{height:3px;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .score-num{font-size:10px;color:var(--muted);width:22px}

  .state-msg{padding:48px 20px;text-align:center}
  .state-msg .icon{font-size:30px;margin-bottom:10px;opacity:.4}
  .state-msg p{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:5px}
  .state-msg small{font-size:10px;color:var(--border2);font-family:var(--mono)}
  .spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:7px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .sidebar{display:flex;flex-direction:column;gap:14px;position:sticky;top:20px}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden}
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
  .panel-head h3{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
  .panel-head button{font-family:var(--mono);font-size:9px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:3px}
  .panel-head button:hover{color:var(--accent)}
  .panel-body{padding:12px 14px}
  .panel-loading{padding:20px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted)}

  .mkt-grid{display:flex;flex-direction:column;gap:10px}
  .mkt-row{display:flex;align-items:center;justify-content:space-between}
  .mkt-sym{font-family:var(--mono);font-size:13px;font-weight:600}
  .mkt-vals{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
  .mkt-price{font-family:var(--mono);font-size:13px}
  .mkt-chg{font-family:var(--mono);font-size:11px}
  .mkt-chg.pos{color:var(--green)} .mkt-chg.neg{color:var(--red)}
  .mkt-pm{font-family:var(--mono);font-size:10px;color:var(--muted)}
  .mkt-sep{height:1px;background:var(--border);margin:4px 0}
  .vix-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
  .vix-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
  .vix-val{font-family:var(--mono);font-size:16px;font-weight:600}
  .vix-val.low{color:var(--green)} .vix-val.mid{color:var(--yellow)} .vix-val.high{color:var(--red)}
  .vix-desc{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px}

  .sector-list{display:flex;flex-direction:column;gap:7px}
  .sector-row{display:flex;align-items:center;gap:8px}
  .sector-name{font-family:var(--sans);font-size:11px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sector-track{width:60px;height:4px;background:var(--border2);border-radius:2px;overflow:hidden;flex-shrink:0}
  .sector-fill{height:4px;border-radius:2px}
  .sector-pct{font-family:var(--mono);font-size:10px;width:42px;text-align:right;flex-shrink:0}
  .sector-pct.pos{color:var(--green)} .sector-pct.neg{color:var(--red)}

  .cal-list{display:flex;flex-direction:column;gap:8px}
  .cal-item{display:flex;align-items:flex-start;gap:9px}
  .cal-dot{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
  .cal-dot.high{background:var(--red)} .cal-dot.medium{background:var(--yellow)} .cal-dot.low{background:var(--muted)}
  .cal-name{font-family:var(--sans);font-size:11px;color:var(--text);line-height:1.4}
  .cal-time{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}

  .news-list{display:flex;flex-direction:column;gap:10px}
  .news-item{border-bottom:1px solid var(--border);padding-bottom:10px}
  .news-item:last-child{border-bottom:none;padding-bottom:0}
  .news-title{font-family:var(--sans);font-size:11px;color:var(--text);line-height:1.4;text-decoration:none;display:block}
  .news-title:hover{color:var(--accent)}
  .news-meta{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:3px}
  .news-tickers{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
  .news-ticker{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:2px;background:rgba(0,153,255,.1);color:var(--accent2);border:1px solid rgba(0,153,255,.2)}
  .td-news-tag{font-size:9px;padding:2px 6px;border-radius:2px;background:rgba(0,212,170,.12);color:var(--green);border:1px solid rgba(0,212,170,.25);white-space:nowrap;cursor:pointer;font-family:var(--mono)}
  .td-news-tag:hover{background:rgba(0,212,170,.2)}
  .td-no-news{font-size:10px;color:var(--border2);font-family:var(--mono)}bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:10px 15px;font-family:var(--mono);font-size:11px;color:var(--text);transform:translateY(60px);opacity:0;transition:all .25s;z-index:100;max-width:280px}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.error{border-color:rgba(255,77,106,.4);color:var(--red)}
  .toast.success{border-color:rgba(0,212,170,.4);color:var(--green)}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <h1>⬛ GAP SCANNER</h1>
      <span>Google Finance · No API Key</span>
    </div>
    <div class="header-right">
      <span class="clock" id="clock">--:--:-- ET</span>
      <span class="mstatus" id="mstatus">—</span>
    </div>
  </header>

  <div class="worker-bar">
    <label>Worker URL</label>
    <input type="text" id="workerUrl" placeholder="https://gap-scanner.yourname.workers.dev" autocomplete="off">
    <button class="btn btn-sec" onclick="testWorker()">Test Connection</button>
    <span class="wstatus idle" id="wstatus">● Not tested</span>
  </div>

  <div class="layout">
    <div>
      <div class="controls">
        <div class="cg"><label>Min Gap %</label><input type="number" id="minGap" value="5" min="1" step="1"></div>
        <div class="cg"><label>Min Price ($)</label><input type="number" id="minPrice" value="1" min="0.1" step="0.1"></div>
        <div class="cg"><label>Max Price ($)</label><input type="number" id="maxPrice" value="20" min="1" step="0.5"></div>
        <div class="cg">
          <label>Auto Refresh</label>
          <select id="autoRefresh" onchange="setAutoRefresh(this.value)">
            <option value="0">Off</option>
            <option value="60">1 min</option>
            <option value="120">2 min</option>
            <option value="300">5 min</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="scanBtn" onclick="runScan()">▶ Run Scan</button>
        <button class="btn btn-sec" onclick="clearResults()">Clear</button>
        <button class="btn btn-sec" onclick="exportCSV()">↓ CSV</button>
        <span class="scan-info" id="scanInfo"></span>
      </div>

      <div class="stats-row" id="statsRow" style="display:none">
        <div class="stat"><span class="stat-label">Gappers</span><span class="stat-value" id="sCount">0</span></div>
        <div class="stat"><span class="stat-label">Avg Gap</span><span class="stat-value g" id="sAvg">—</span></div>
        <div class="stat"><span class="stat-label">Top Gap</span><span class="stat-value g" id="sTop">—</span></div>
        <div class="stat"><span class="stat-label">Scanned</span><span class="stat-value m" id="sTime">—</span></div>
      </div>

      <div class="table-wrap">
        <div class="table-head">
          <h2>Results</h2>
          <span class="rcount" id="rcount">—</span>
        </div>
        <div class="tbl-scroll">
          <div id="tableContainer">
            <div class="state-msg">
              <div class="icon">⬛</div>
              <p>Enter your Gap Scanner Worker URL and press Run Scan.</p>
              <small>Data from Google Finance — no API key needed.</small>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="sidebar">
      <div class="panel">
        <div class="panel-head"><h3>Market</h3><button onclick="loadMarket()">↻ Refresh</button></div>
        <div class="panel-body" id="marketPanel"><div class="panel-loading"><span class="spinner"></span>Loading...</div></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h3>Sectors Today</h3><button onclick="loadSectors()">↻ Refresh</button></div>
        <div class="panel-body" id="sectorsPanel"><div class="panel-loading"><span class="spinner"></span>Loading...</div></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h3>Latest News</h3><button onclick="loadNews()">↻ Refresh</button></div>
        <div class="panel-body" id="newsPanel"><div class="panel-loading"><span class="spinner"></span>Loading...</div></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let results = [], prevTickers = new Set(), sortCol = 'gapPct', sortDir = -1, autoTimer = null;

// Persist worker URL
const saved = localStorage.getItem('gap_worker_url');
if (saved) document.getElementById('workerUrl').value = saved;
document.getElementById('workerUrl').addEventListener('input', function() {
  localStorage.setItem('gap_worker_url', this.value.trim());
  if (this.value.trim()) loadSidebar();
});

// Clock
function updateClock() {
  const et = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent = `${pad(et.getHours())}:${pad(et.getMinutes())}:${pad(et.getSeconds())} ET`;
  const t = et.getHours()*60+et.getMinutes();
  const el = document.getElementById('mstatus');
  if      (t>=240&&t<570)  { el.textContent='Pre-Market'; el.className='mstatus pre'; }
  else if (t>=570&&t<960)  { el.textContent='Market Open'; el.className='mstatus open'; }
  else if (t>=960&&t<1200) { el.textContent='After Hours'; el.className='mstatus pre'; }
  else                     { el.textContent='Closed'; el.className='mstatus closed'; }
}
setInterval(updateClock, 1000); updateClock();

function base() { return document.getElementById('workerUrl').value.trim().replace(/\/$/,''); }

async function call(path) {
  const b = base();
  if (!b) throw new Error('No Worker URL set');
  const res = await fetch(`${b}${path}`);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'Worker error');
  return json;
}

async function testWorker() {
  const el = document.getElementById('wstatus');
  el.textContent='● Testing...'; el.className='wstatus idle';
  try {
    await call('/health');
    el.textContent='● Connected'; el.className='wstatus ok';
    showToast('Worker online ✓','success');
    loadSidebar();
  } catch(e) {
    el.textContent='● Failed'; el.className='wstatus err';
    showToast('Failed: '+e.message,'error');
  }
}

function setAutoRefresh(val) {
  clearInterval(autoTimer);
  const s = parseInt(val);
  if (s>0) { autoTimer=setInterval(runScan,s*1000); showToast(`Auto-refresh every ${s}s`,'success'); }
}

async function runScan() {
  if (!base()) { showToast('Enter Worker URL first','error'); return; }
  const minGap   = document.getElementById('minGap').value   || 5;
  const minPrice = document.getElementById('minPrice').value || 1;
  const maxPrice = document.getElementById('maxPrice').value || 20;
  const btn = document.getElementById('scanBtn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Scanning...';
  setState('loading');
  try {
    const data = await call(`/scan?minGap=${minGap}&minPrice=${minPrice}&maxPrice=${maxPrice}`);
    const newSet = new Set((data.stocks||[]).map(s=>s.ticker));
    results = (data.stocks||[]).map(s=>({...s, isNew:!prevTickers.has(s.ticker)}));
    prevTickers = newSet;
    renderTable();
    updateStats(data.scannedAt);
    if (!results.length) { setState('empty'); showToast('No matches — try lowering Min Gap %',''); }
    else showToast(`Found ${results.length} gapper${results.length!==1?'s':''}`, 'success');
  } catch(e) {
    setState('error', e.message);
    showToast('Error: '+e.message,'error');
  }
  btn.disabled=false; btn.innerHTML='▶ Run Scan';
}

function renderTable() {
  if (!results.length) { setState('empty'); return; }
  document.getElementById('statsRow').style.display='flex';
  document.getElementById('rcount').textContent=`${results.length} stock${results.length!==1?'s':''}`;
  const sorted=[...results].sort((a,b)=>sortDir*((b[sortCol]??-Infinity)-(a[sortCol]??-Infinity)));
  const th=(k,l)=>`<th class="${sortCol===k?'sorted':''}" onclick="sortBy('${k}')">${l}${sortCol===k?(sortDir===-1?' ↓':' ↑'):''}</th>`;
  document.getElementById('tableContainer').innerHTML=`
    <table>
      <thead><tr>
        ${th('ticker','Ticker')}${th('price','Price')}${th('gapPct','Gap %')}
        ${th('preMarketPrice','Pre-Mkt')}${th('relVol','Rel Vol')}
        ${th('volume','Volume')}<th>Catalyst</th>${th('score','Score')}
      </tr></thead>
      <tbody>${sorted.map(s=>`
        <tr class="${s.isNew?'new-entry':''}" onclick="window.open('https://www.google.com/finance/quote/${s.ticker}:${s.exchange??'NASDAQ'}','_blank')">
          <td class="td-ticker">${s.ticker}${s.isNew?'<span class="atag new">NEW</span>':''}${(s.gapPct??0)>30?'<span class="atag hot">HOT</span>':''}</td>
          <td>${s.price!=null?'$'+s.price.toFixed(2):'—'}</td>
          <td class="td-gap">${s.gapPct!=null?'+'+s.gapPct.toFixed(1)+'%':'—'}</td>
          <td style="color:var(--yellow);font-family:var(--mono);font-size:12px">${s.preMarketPrice!=null?'$'+s.preMarketPrice.toFixed(2)+(s.preMarketChange!=null?' ('+( s.preMarketChange>0?'+':'')+s.preMarketChange.toFixed(1)+'%)':''):'—'}</td>
          <td style="color:var(--purple);font-family:var(--mono);font-size:12px">${s.relVol!=null?s.relVol.toFixed(1)+'x':'—'}</td>
          <td class="td-muted">${fmtVol(s.volume)}</td>
          <td>${s.hasNews && s.headline
            ? `<span class="td-news-tag" title="${s.headline}" onclick="event.stopPropagation();window.open('${s.newsUrl}','_blank')">📰 NEWS</span>`
            : `<span class="td-no-news">—</span>`}</td>
          <td><div class="score-bar"><div class="score-track"><div class="score-fill" style="width:${s.score}%"></div></div><span class="score-num">${s.score}</span></div></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function sortBy(col) { if(sortCol===col)sortDir*=-1; else{sortCol=col;sortDir=-1;} renderTable(); }

function updateStats(iso) {
  document.getElementById('sCount').textContent=results.length;
  const gaps=results.map(r=>r.gapPct).filter(Boolean);
  if(gaps.length){
    document.getElementById('sAvg').textContent='+'+(gaps.reduce((a,b)=>a+b,0)/gaps.length).toFixed(1)+'%';
    document.getElementById('sTop').textContent='+'+Math.max(...gaps).toFixed(1)+'%';
  }
  const t=iso?new Date(iso):new Date();
  document.getElementById('sTime').textContent=t.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('scanInfo').textContent=`Last: ${t.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
}

// Sidebar
function loadSidebar() { if(!base()) return; loadMarket(); loadSectors(); loadNews(); }

async function loadMarket() {
  document.getElementById('marketPanel').innerHTML='<div class="panel-loading"><span class="spinner"></span>Loading...</div>';
  try {
    const d = await call('/market');
    const row=(sym,q)=>{
      if(!q||q.error) return `<div class="mkt-row"><span class="mkt-sym">${sym}</span><span class="td-muted">—</span></div>`;
      const pos=(q.changePct??0)>=0;
      return `<div class="mkt-row"><span class="mkt-sym">${sym}</span><div class="mkt-vals">
        <span class="mkt-price">${q.price!=null?'$'+q.price.toFixed(2):'—'}</span>
        <span class="mkt-chg ${pos?'pos':'neg'}">${q.changePct!=null?(pos?'+':'')+q.changePct.toFixed(2)+'%':'—'}</span>
        ${q.preMarket?`<span class="mkt-pm">PM: $${q.preMarket.toFixed(2)}</span>`:''}
      </div></div>`;
    };
    const v=d.vix?.price;
    const vc=v==null?'':v<15?'low':v<25?'mid':'high';
    const vl=v==null?'—':v<15?'Low volatility':v<25?'Moderate':' High — be careful';
    document.getElementById('marketPanel').innerHTML=`
      <div class="mkt-grid">${row('SPY',d.spy)}<div class="mkt-sep"></div>${row('QQQ',d.qqq)}</div>
      <div class="vix-row"><div><div class="vix-label">VIX</div><div class="vix-desc">${vl}</div></div>
      <span class="vix-val ${vc}">${v!=null?v.toFixed(2):'—'}</span></div>`;
  } catch(e) {
    document.getElementById('marketPanel').innerHTML=`<div class="panel-loading" style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

async function loadSectors() {
  document.getElementById('sectorsPanel').innerHTML='<div class="panel-loading"><span class="spinner"></span>Loading...</div>';
  try {
    const d = await call('/sectors');
    if(!d.sectors?.length){document.getElementById('sectorsPanel').innerHTML='<div class="panel-loading">No data</div>';return;}
    const max=Math.max(...d.sectors.map(s=>Math.abs(s.changePct)));
    document.getElementById('sectorsPanel').innerHTML=`<div class="sector-list">${d.sectors.map(s=>{
      const pos=s.changePct>=0, w=Math.round(Math.abs(s.changePct)/max*100);
      return `<div class="sector-row">
        <span class="sector-name" title="${s.name}">${s.name}</span>
        <div class="sector-track"><div class="sector-fill" style="width:${w}%;background:${pos?'var(--green)':'var(--red)'}"></div></div>
        <span class="sector-pct ${pos?'pos':'neg'}">${pos?'+':''}${s.changePct.toFixed(1)}%</span>
      </div>`;}).join('')}</div>`;
  } catch(e) {
    document.getElementById('sectorsPanel').innerHTML=`<div class="panel-loading" style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

async function loadNews() {
  document.getElementById('newsPanel').innerHTML='<div class="panel-loading"><span class="spinner"></span>Loading...</div>';
  try {
    const d = await call('/news');
    if(!d.items?.length){document.getElementById('newsPanel').innerHTML='<div class="panel-loading">No news</div>';return;}
    document.getElementById('newsPanel').innerHTML=`<div class="news-list">${d.items.slice(0,15).map(n=>`
      <div class="news-item">
        <a class="news-title" href="${n.link}" target="_blank">${n.title}</a>
        <div class="news-meta">${n.pubDate ? new Date(n.pubDate).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) : ''}</div>
        ${n.tickers?.length ? `<div class="news-tickers">${n.tickers.slice(0,4).map(t=>`<span class="news-ticker">${t}</span>`).join('')}</div>` : ''}
      </div>`).join('')}</div>`;
  } catch(e) {
    document.getElementById('newsPanel').innerHTML=`<div class="panel-loading" style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

function setState(s, msg='') {
  const m={
    loading:`<div class="state-msg"><p><span class="spinner"></span>Fetching from Google Finance...</p></div>`,
    empty:`<div class="state-msg"><div class="icon">📭</div><p>No gappers matched your filters.</p><small>Try lowering Min Gap % or widening price range.</small></div>`,
    error:`<div class="state-msg"><div class="icon">⚠️</div><p style="color:var(--red)">${msg}</p><small>Check your Worker URL and deployment.</small></div>`,
  };
  if(m[s]) document.getElementById('tableContainer').innerHTML=m[s];
}

function clearResults() {
  results=[]; prevTickers=new Set();
  document.getElementById('tableContainer').innerHTML='<div class="state-msg"><div class="icon">⬛</div><p>Cleared.</p></div>';
  document.getElementById('statsRow').style.display='none';
  document.getElementById('rcount').textContent='—';
  document.getElementById('scanInfo').textContent='';
}

function fmtVol(v) {
  if(!v) return '—';
  if(v>=1e6) return (v/1e6).toFixed(1)+'M';
  if(v>=1e3) return (v/1e3).toFixed(0)+'K';
  return String(v);
}

function exportCSV() {
  if(!results.length){showToast('No results','');return;}
  const h='Ticker,Company,Price,Gap%,PrevClose,Volume,Score\n';
  const r=results.map(s=>`${s.ticker},"${s.company??''}",${s.price??''},${s.gapPct?.toFixed(2)??''},${s.prevClose??''},${s.volume??''},${s.score}`).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([h+r],{type:'text/csv'}));
  a.download=`gap-scan-${new Date().toISOString().slice(0,16).replace('T','_')}.csv`;
  a.click(); showToast('CSV exported','success');
}

let toastT;
function showToast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast show ${type}`;
  clearTimeout(toastT); toastT=setTimeout(()=>el.className='toast',3000);
}

if(base()) loadSidebar();
</script>
</body>
</html>
